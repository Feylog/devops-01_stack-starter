stages:
  - build
  - test
  - deploy

variables:
  IMAGE_NAME: $CI_REGISTRY_IMAGE/api
  IMAGE_TAG: $CI_COMMIT_SHORT_SHA

build:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - cd app/fastapi
    - docker build -t $IMAGE_NAME:$IMAGE_TAG -t $IMAGE_NAME:latest .
    - docker push $IMAGE_NAME:$IMAGE_TAG
    - docker push $IMAGE_NAME:latest
  only:
    - main

test:
  stage: test
  image: python:3.11-slim
  script:
    - cd app/fastapi
    - pip install -r requirements.txt
    - pip install pytest httpx
    - python -m pytest tests/ -v
  only:
    - main

deploy:
  stage: deploy
  image: alpine:3.19
  before_script:
    - apk add --no-cache openssh-client
    - mkdir -p ~/.ssh
    - echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
    - chmod 600 ~/.ssh/id_ed25519
    - ssh-keyscan -H $DEPLOY_HOST >> ~/.ssh/known_hosts 2>/dev/null
  script:
    - ssh -i ~/.ssh/id_ed25519 $DEPLOY_USER@$DEPLOY_HOST "
        cd ~/devops-01_stack-starter &&
        git pull &&
        cd app/fastapi &&
        docker build -t devops01-api:latest . &&
        docker save devops01-api:latest | sudo k3s ctr images import - &&
        kubectl rollout restart deployment api -n devops01 &&
        kubectl rollout status deployment api -n devops01 --timeout=60s
      "
  only:
    - main
