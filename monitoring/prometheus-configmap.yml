apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s

    scrape_configs:
      - job_name: "prometheus"
        static_configs:
          - targets: ["localhost:9090"]

      - job_name: "node_exporter"
        static_configs:
          - targets: ["62.84.117.149:9100"]

      - job_name: "fastapi"
        static_configs:
          - targets: ["api.devops01.svc.cluster.local:8000"]
        metrics_path: "/metrics"
